<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Shop Hola'Ez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', 'Noto Sans Thai', sans-serif; }
        
        /* อนิเมชั่นให้โลโก้ลอยขึ้นลงเบาๆ */
        .float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* พื้นหลังตารางแบบมีมิติ ธีมม่วงอ่อน */
        .bg-grid {
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(168, 85, 247, 0.08) 1px, transparent 1px), 
                linear-gradient(to bottom, rgba(168, 85, 247, 0.08) 1px, transparent 1px);
            transform: perspective(600px) rotateX(60deg);
            transform-origin: bottom;
        }
    </style>
</head>
<body class="relative min-h-screen overflow-hidden bg-gradient-to-br from-white via-[#f8f5ff] to-[#f3e8ff] flex items-center justify-center text-gray-800">

    <!-- กราฟิกพื้นหลังตาราง -->
    <div class="absolute bottom-0 left-0 w-full h-[60%] bg-grid z-0"></div>

    <!-- แสงเงาตกแต่งฉากหลัง (ม่วงและฟ้าอ่อน) -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-purple-200/40 rounded-full mix-blend-multiply filter blur-[100px] z-0 pointer-events-none translate-x-1/3 -translate-y-1/3"></div>
    <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-blue-200/40 rounded-full mix-blend-multiply filter blur-[100px] z-0 pointer-events-none -translate-x-1/3 translate-y-1/3"></div>

    <!-- ส่วนเนื้อหาหลัก -->
    <div class="relative z-10 flex flex-col items-center px-6 w-full max-w-2xl text-center anim-fade-in">
        
        <!-- รูปภาพโลโก้ -->
        <div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-white p-2 border border-purple-100 shadow-[0_10px_40px_rgba(168,85,247,0.15)] mb-6 float">
            <div class="w-full h-full rounded-full bg-gradient-to-br from-purple-500 to-indigo-500 flex items-center justify-center text-white font-bold text-xl">
                Logo
            </div>
        </div>

        <!-- ข้อความหัวข้อ -->
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-3 text-gray-900 drop-shadow-sm">Shop Hola'Ez</h1>
        <p class="text-[14px] md:text-[16px] text-gray-500 font-medium mb-10 max-w-lg leading-relaxed">
            ระบบจัดจำหน่ายบัญชีเกมแท้ ออฟไลน์และออนไลน์ <br class="hidden md:block">
            <span class="text-purple-600 font-semibold">ราคาประหยัด ปลอดภัย รับประกัน 100%</span>
        </p>

        <!-- ปุ่มกด 2 ปุ่ม -->
        <div class="flex flex-row gap-4 w-full max-w-[420px]">
            
            <!-- 1. ปุ่มร้านค้า (ปุ่มสีขาว กรอบม่วง) -->
            <a href="index.html" class="flex-1 group relative overflow-hidden rounded-2xl border border-purple-100 bg-white hover:bg-purple-50 hover:border-purple-300 transition-all duration-300 py-3.5 flex flex-col items-center justify-center gap-1.5 shadow-sm hover:shadow-md active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7 text-purple-400 group-hover:text-purple-600 group-hover:-translate-y-1 transition-all duration-300">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349M3.75 21V9.35m0 0a3.001 3.001 0 0 0 3.75-.615A2.999 2.999 0 0 0 9.75 9.75c.896 0 1.7-.393 2.25-1.016a2.999 2.999 0 0 0 2.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 0 0 3.75.614m-16.5 0a3.004 3.004 0 0 1-.621-4.72l1.4-6.195A1.5 1.5 0 0 1 5.378 3h13.243a1.5 1.5 0 0 1 1.06.44l1.19 1.189a3 3 0 0 1-.621 4.72M6.75 18h3.75a.75.75 0 0 0 .75-.75V13.5a.75.75 0 0 0-.75-.75H6.75a.75.75 0 0 0-.75.75v3.75c0 .415.336.75.75.75Z" />
                </svg>
                <span class="text-[13px] font-bold text-gray-600 group-hover:text-purple-700 tracking-wide">ไปที่ร้านค้า</span>
            </a>

            <!-- 2. ปุ่มเข้าสู่ระบบ (ปุ่มสีม่วง) -->
            <a href="index.html?login=true" class="flex-1 group relative overflow-hidden rounded-2xl bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 transition-all duration-300 py-3.5 flex flex-col items-center justify-center gap-1.5 shadow-[0_8px_20px_rgba(168,85,247,0.3)] hover:shadow-[0_10px_25px_rgba(168,85,247,0.4)] active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7 text-white/90 group-hover:text-white group-hover:-translate-y-1 transition-all duration-300">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
                </svg>
                <span class="text-[13px] font-bold text-white tracking-wide">เข้าสู่ระบบ</span>
            </a>

        </div>
    </div>

</body>
</html>
